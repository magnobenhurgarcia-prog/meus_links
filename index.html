<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Magno Benhur Garcia | Links</title>
    <meta name="description" content="Aulas de violão, ebooks, desafio e projetos musicais de Magno Benhur Garcia.">
    <meta name="theme-color" content="#060807">
    <meta property="og:title" content="Magno Benhur Garcia | Links">
    <meta property="og:description" content="Aulas, ebooks, desafio e bandas em um só lugar.">
    <meta property="og:image" content="assets/magno.png">
    <link rel="preload" as="image" href="assets/magno.png" fetchpriority="high">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="hero-band">
      <div class="page-shell page-shell--hero">
        <section class="hero" aria-labelledby="profile-name">
          <img id="profile-image" class="hero__image" src="assets/magno.png" alt="Magno Benhur Garcia" width="1080" height="1080" fetchpriority="high" decoding="async">
          <div class="hero__shade"></div>
          <div class="hero__content">
            <p class="eyebrow">Músico • Professor • Produtor</p>
            <h1 id="profile-name">Magno Benhur Garcia</h1>
            <p class="hero__copy">Violão, prática musical e projetos ao vivo para quem quer tocar de verdade.</p>
          </div>
        </section>
      </div>
    </header>

    <main>
      <div class="music-band">
        <div class="music-band__texture" aria-hidden="true"></div>
        <div class="page-shell page-shell--content">
      <section class="featured" aria-labelledby="featured-title">
        <div class="section-heading">
          <span class="section-heading__mark" aria-hidden="true"></span>
          <h2 id="featured-title">Destaques</h2>
        </div>
        <div id="featured-links" class="featured-grid"></div>
      </section>

      <section class="quick-links" aria-labelledby="quick-title">
        <div class="section-heading section-heading--secondary">
          <span class="section-heading__mark" aria-hidden="true"></span>
          <h2 id="quick-title">Mais links</h2>
        </div>
        <div id="quick-links" class="link-grid"></div>
      </section>
        </div>
      </div>
    </main>

    <footer class="footer">
      <p>© 2026 Magno Benhur Garcia</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
